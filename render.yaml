previews:
  generation: off

envVarGroups:
  - name: research-center-shared-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

  - name: research-center-runtime
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTO_CREATE_SCHEMA
        value: "false"
      - key: SEED_DEMO_DATA
        value: "false"
      - key: TIMEZONE
        value: Europe/Zurich
      - key: TZ
        value: Europe/Zurich
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: ENABLE_EMBEDDINGS
        value: "false"
      - key: AI_DAILY_COST_LIMIT_USD
        value: "10.0"
      - key: LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: "5"
      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: LOGIN_RATE_LIMIT_LOCKOUT_MINUTES
        value: "30"
      - key: DATABASE_BACKUP_RETENTION_COUNT
        value: "14"

databases:
  - name: research-center-postgres
    databaseName: research_center
    user: research_center
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: keyvalue
    name: research-center-kv
    region: frankfurt
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: research-center-api
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: apps/backend
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: DATABASE_URL
        fromDatabase:
          name: research-center-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://research-center-web.onrender.com
      - key: SENTRY_DSN
        sync: false
      - key: METRICS_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_TTS_CREDENTIALS_JSON
        sync: false
      - key: GMAIL_OAUTH_CLIENT_ID
        sync: false
      - key: GMAIL_OAUTH_CLIENT_SECRET
        sync: false

  - type: worker
    name: research-center-worker
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: apps/backend
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=2
    disk:
      name: research-center-worker-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: DATABASE_URL
        fromDatabase:
          name: research-center-postgres
          property: connectionString
      - key: DATABASE_BACKUP_DIR
        value: /var/data/db_backups
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN
      - key: METRICS_TOKEN
        fromService:
          type: web
          name: research-center-api
          envVarKey: METRICS_TOKEN
      - key: WORKER_METRICS_PORT
        sync: false
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: research-center-api
          envVarKey: GEMINI_API_KEY
      - key: GMAIL_OAUTH_CLIENT_ID
        fromService:
          type: web
          name: research-center-api
          envVarKey: GMAIL_OAUTH_CLIENT_ID
      - key: GMAIL_OAUTH_CLIENT_SECRET
        fromService:
          type: web
          name: research-center-api
          envVarKey: GMAIL_OAUTH_CLIENT_SECRET

  - type: web
    name: research-center-web
    runtime: static
    rootDir: apps/web
    buildFilter:
      paths:
        - apps/web/**
        - render.yaml
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://research-center-api.onrender.com/api

  # Render cron jobs run in UTC. These enqueue lightweight tasks often enough for the
  # worker to decide when Zurich-local jobs are actually due.
  - type: cron
    name: research-center-ingest-cron
    runtime: python
    region: frankfurt
    rootDir: apps/backend
    schedule: "*/30 * * * *"
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: python -m app.tasks.jobs enqueue-ingest
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN

  - type: cron
    name: research-center-database-backup-cron
    runtime: python
    region: frankfurt
    rootDir: apps/backend
    schedule: "30 1 * * *"
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: python -m app.tasks.jobs enqueue-database-backup
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: DATABASE_URL
        fromDatabase:
          name: research-center-postgres
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN

  - type: cron
    name: research-center-digest-cron
    runtime: python
    region: frankfurt
    rootDir: apps/backend
    schedule: "*/15 * * * *"
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: python -m app.tasks.jobs enqueue-digest
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN

  - type: cron
    name: research-center-zotero-sync-cron
    runtime: python
    region: frankfurt
    rootDir: apps/backend
    schedule: "*/30 * * * *"
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: python -m app.tasks.jobs enqueue-zotero-sync
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN

  - type: cron
    name: research-center-raw-payload-purge-cron
    runtime: python
    region: frankfurt
    rootDir: apps/backend
    schedule: "15 2 * * *"
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    buildCommand: pip install -r requirements-render.txt && pip install --no-deps -e .
    startCommand: python -m app.tasks.jobs enqueue-purge-raw-email-payloads
    envVars:
      - fromGroup: research-center-shared-secrets
      - fromGroup: research-center-runtime
      - key: ADMIN_EMAIL
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_EMAIL
      - key: ADMIN_PASSWORD
        fromService:
          type: web
          name: research-center-api
          envVarKey: ADMIN_PASSWORD
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: research-center-kv
          property: connectionString
      - key: SENTRY_DSN
        fromService:
          type: web
          name: research-center-api
          envVarKey: SENTRY_DSN

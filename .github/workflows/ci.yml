name: CI

on:
  pull_request:
  push:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --extra dev

      - name: Run backend tests
        run: uv run pytest -q app/tests

      - name: Run backend lint
        run: uv run ruff check app

      - name: Audit backend runtime dependencies
        run: |
          uv export --frozen --no-dev --format requirements-txt --no-editable --no-hashes --no-emit-project --output-file /tmp/research-center-backend-runtime.txt > /dev/null
          uv tool run --from pip-audit pip-audit -r /tmp/research-center-backend-runtime.txt --progress-spinner off

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Audit frontend runtime dependencies
        run: npm audit --omit=dev
